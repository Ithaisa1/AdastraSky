# Render Blueprint — AdAstra Sky
# https://render.com/docs/blueprint-spec
#
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com/blueprints
# 3. Connect repo → Render auto-creates all services
# 4. Set the missing env vars in each service dashboard

services:
  # ─── Backend (Node.js + Express) ───────────────────────────
  - type: web
    name: adastra-sky-backend
    runtime: node
    repo: https://github.com/tu-usuario/adastra-sky
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false  # set manually in dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: adastra-sky-db
          property: connectionString
      - key: AI_SERVICE_URL
        fromService:
          name: adastra-sky-ai
          type: web
          property: host
        value: https://adastra-sky-ai.onrender.com  # fallback
      - key: FRONTEND_URL
        fromService:
          name: adastra-sky-frontend
          type: web
          property: host
        value: https://adastra-sky.vercel.app  # fallback
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NASA_API_KEY
        sync: false

  # ─── AI Service (FastAPI + LangGraph) ─────────────────────
  - type: web
    name: adastra-sky-ai
    runtime: python
    repo: https://github.com/tu-usuario/adastra-sky
    branch: main
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        fromDatabase:
          name: adastra-sky-db
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: ./rag/chroma_db
      - key: FRONTEND_URL
        fromService:
          name: adastra-sky-frontend
          type: web
          property: host
        value: https://adastra-sky.vercel.app

databases:
  # ─── PostgreSQL ────────────────────────────────────────────
  - name: adastra-sky-db
    databaseName: adastra_sky
    plan: free
    postgresMajorVersion: 16
