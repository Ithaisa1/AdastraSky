# Render Blueprint — AdAstra Sky
# https://render.com/docs/blueprint-spec

services:
  # ─── Backend (Node.js + Express) ───────────────────────────
  - type: web
    name: adastra-sky-backend
    runtime: node
    repo: https://github.com/Ithaisa1/AdastraSky
    branch: main
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: adastra-sky-db
          property: connectionString
      - key: AI_SERVICE_URL
        value: https://adastra-sky-ai.onrender.com
      - key: FRONTEND_URL
        value: https://adastra-sky.vercel.app
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NASA_API_KEY
        sync: false

  # ─── AI Service (FastAPI + LangGraph) ──────────────────────
  - type: web
    name: adastra-sky-ai
    runtime: python
    repo: https://github.com/Ithaisa1/AdastraSky
    branch: main
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: mistralai/Mistral-7B-Instruct-v0.3
      - key: FRONTEND_URL
        value: https://adastra-sky.vercel.app

databases:
  # ─── PostgreSQL ────────────────────────────────────────────
  - name: adastra-sky-db
    databaseName: adastrasky
    plan: free
    postgresMajorVersion: 18