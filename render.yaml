# Render Blueprint — AdAstra Sky
# https://render.com/docs/blueprint-spec

services:
  # ─── Backend (Node.js + Express) ───────────────────────────
  - type: web
    name: adastra-sky-backend
    runtime: node
    repo: https://github.com/Ithaisa1/AdastraSky
    branch: main
    rootDir: backend
    plan: free
    buildCommand: npm install && npx sequelize-cli db:migrate
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: adastra-sky-db
          property: connectionString
      - key: AI_SERVICE_URL
        value: https://adastra-sky-ai.onrender.com
      - key: FRONTEND_URL
        value: https://adastra-sky.vercel.app
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NASA_API_KEY
        sync: false

databases:
  # ─── PostgreSQL ────────────────────────────────────────────
  - name: adastra-sky-db
    databaseName: adastrasky
    plan: free
    postgresMajorVersion: 18