# Render Blueprint — AdAstra Sky
# https://render.com/docs/blueprint-spec

services:
  # ─── Backend (Node.js + Express) ───────────────────────────
  - type: web
    name: adastra-sky-backend
    runtime: node
    repo: https://github.com/Ithaisa1/AdastraSky
    branch: main
    rootDir: backend
    buildCommand: npm install && npx sequelize-cli db:migrate
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: adastra-sky-db
          property: connectionString
      - key: AI_SERVICE_URL
        value: https://adastra-sky-ai.onrender.com
      - key: FRONTEND_URL
        value: https://adastra-sky.vercel.app
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NASA_API_KEY
        sync: false

  # ─── AI Service (FastAPI + LangGraph) ─────────────────────
  - type: web
    name: adastra-sky-ai
    runtime: python
    repo: https://github.com/Ithaisa1/AdastraSky
    branch: main
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        fromDatabase:
          name: adastra-sky-db
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: ./rag/chroma_db
      - key: FRONTEND_URL
        value: https://adastrasky.vercel.app

databases:
  # ─── PostgreSQL ────────────────────────────────────────────
  - name: adastra-sky-db
    databaseName: adastra_sky
    plan: free
    postgresMajorVersion: 16